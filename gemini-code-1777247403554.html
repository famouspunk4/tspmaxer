<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSP MAXER 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4b5320; /* Marine Olive */
            --secondary: #2c3e50;
            --accent: #27ae60; /* Success Green */
            --error: #c0392b;
            --bg: #f4f7f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .limit-header { text-align: center; color: #666; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* New Status Bar Styles */
        .status-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-item { background: #eee; padding: 10px; border-radius: 6px; text-align: center; font-size: 0.8em; font-weight: bold; }
        .status-item.active { background: var(--accent); color: white; }
        .match-alert { grid-column: span 3; background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-section { display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.85em; color: var(--secondary); }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        #error-msg { color: var(--error); font-weight: bold; text-align: center; margin-top: 10px; display: none; }

        .results-panel { display: flex; flex-direction: column; gap: 15px; }
        .card { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .card.primary { background: var(--primary); color: white; }
        .card.accent { background: var(--accent); color: white; }
        .val { font-size: 1.8em; font-weight: bold; display: block; margin: 5px 0; }
        
        .tracker-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        .tracker-table th { background: #eee; padding: 8px; text-align: left; }
        .tracker-table td { padding: 5px; border-bottom: 1px solid #eee; }
        .tracker-table input { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid transparent; }
        .tracker-table input:focus { border: 1px solid var(--primary); background: #fff; }
        .filled { background: #e8f5e9; }
        .over-limit { background: #fadbd8 !important; }

        .chart-container { margin-top: 30px; height: 300px; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } .status-bar { grid-template-columns: 1fr; } .match-alert { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>TSP MAXER</h1>
    <p class="limit-header">2026 Elective Deferral Limit: $24,500.00</p>

    <div class="status-bar">
        <div id="status-tis" class="status-item">TIS: 2+ Years? <input type="checkbox" id="tisCheck" onchange="calculate()"></div>
        <div id="status-contrib" class="status-item">Contrib: 5%+?</div>
        <div id="status-match" class="status-item">Matching Active?</div>
        <div id="match-notif" class="match-alert">ELIGIBLE FOR GOVERNMENT MATCHING (5%)</div>
    </div>

    <div id="error-msg">⚠️ TOTAL EXCEEDS 2026 LIMIT ($24,500)</div>

    <div class="main-layout">
        <div class="input-section">
            <div class="input-group">
                <label>Monthly Basic Pay ($)</label>
                <input type="number" id="basePay" value="0" oninput="calculate()">
            </div>
            
            <table class="tracker-table" id="tracker">
                <thead>
                    <tr><th>Month</th><th>Contribution ($)</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="text-align: right; font-weight: bold; margin-top: 10px;">
                Total YTD: <span id="ytdTotal">$0.00</span>
            </div>
        </div>

        <div class="results-panel">
            <div class="card primary" id="leftCard">
                <label style="color: rgba(255,255,255,0.8)">Amount Left to Max</label>
                <span class="val" id="amtLeft">$0.00</span>
            </div>
            
            <div class="card accent">
                <label style="color: rgba(255,255,255,0.8)">Recommended myPay %</label>
                <span class="val" id="percentReq">0%</span>
                <small id="monthlyVal">($0.00 / month)</small>
            </div>

            <div class="input-group">
                <label>Estimated Annual Return (%)</label>
                <input type="number" id="roi" value="10" oninput="calculate()">
            </div>

            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const LIMIT = 24500;
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    let chart;

    const tbody = document.querySelector('#tracker tbody');
    months.forEach((m, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${m}</td><td><input type="number" class="month-input" data-index="${i}" oninput="calculate()"></td>`;
        tbody.appendChild(row);
    });

    function calculate() {
        const basePay = parseFloat(document.getElementById('basePay').value) || 0;
        const roi = (parseFloat(document.getElementById('roi').value) || 0) / 100;
        const tisEligible = document.getElementById('tisCheck').checked;
        const inputs = document.querySelectorAll('.month-input');
        const errorMsg = document.getElementById('error-msg');
        
        let ytd = 0;
        let lastFilledIndex = -1;
        const monthlyValues = [];
        let contributingFivePercent = false;

        inputs.forEach((input, i) => {
            const val = parseFloat(input.value) || 0;
            monthlyValues.push(val);
            if (val > 0) {
                ytd += val;
                input.parentElement.parentElement.classList.add('filled');
                lastFilledIndex = i;
                // Check if current month contribution is at least 5% of base pay
                if (basePay > 0 && (val / basePay) >= 0.05) contributingFivePercent = true;
            } else {
                input.parentElement.parentElement.classList.remove('filled');
            }
        });

        // Error Handling for Limit
        if (ytd > LIMIT) {
            errorMsg.style.display = 'block';
            document.getElementById('leftCard').style.background = 'var(--error)';
            inputs.forEach(input => input.parentElement.parentElement.classList.add('over-limit'));
        } else {
            errorMsg.style.display = 'none';
            document.getElementById('leftCard').style.background = 'var(--primary)';
            inputs.forEach(input => input.parentElement.parentElement.classList.remove('over-limit'));
        }

        // Matching Logic UI
        const statusTis = document.getElementById('status-tis');
        const statusContrib = document.getElementById('status-contrib');
        const statusMatch = document.getElementById('status-match');
        const matchNotif = document.getElementById('match-notif');

        tisEligible ? statusTis.classList.add('active') : statusTis.classList.remove('active');
        contributingFivePercent ? statusContrib.classList.add('active') : statusContrib.classList.remove('active');

        if (tisEligible && contributingFivePercent) {
            statusMatch.classList.add('active');
            statusMatch.innerText = "Matching: ACTIVE";
            matchNotif.style.display = 'block';
        } else {
            statusMatch.classList.remove('active');
            statusMatch.innerText = "Matching: INACTIVE";
            matchNotif.style.display = 'none';
        }

        let monthsRemaining = 11 - lastFilledIndex;
        const left = LIMIT - ytd;
        const reqMonthly = left / (monthsRemaining || 1);
        const reqPercent = basePay > 0 ? (reqMonthly / basePay) * 100 : 0;

        document.getElementById('ytdTotal').innerText = `$${ytd.toLocaleString()}`;
        document.getElementById('amtLeft').innerText = left <= 0 ? "MAXED" : `$${left.toLocaleString()}`;
        
        if (left <= 0) {
            document.getElementById('percentReq').innerText = "MAXED";
            document.getElementById('monthlyVal').innerText = "Limit Reached";
        } else {
            document.getElementById('percentReq').innerText = `${Math.ceil(reqPercent)}%`;
            document.getElementById('monthlyVal').innerText = `($${reqMonthly.toLocaleString()}/mo)`;
        }

        // Add 5% match to growth calculation if eligible
        const matchAmount = (tisEligible && contributingFivePercent) ? (basePay * 0.05) : 0;
        
        localStorage.setItem('tsp_maxer_data_v2', JSON.stringify({ basePay, roi: document.getElementById('roi').value, monthlyValues, tisEligible }));
        updateChart(ytd, (left > 0 ? reqMonthly : 0) + matchAmount, roi);
    }

    function updateChart(currentTotal, monthlyIn, rate) {
        const labels = [];
        const points = [];
        let balance = currentTotal;
        const annualIn = monthlyIn * 12;

        for (let i = 0; i <= 10; i++) {
            labels.push(`Year ${i}`);
            points.push(Math.round(balance));
            balance = (balance + annualIn) * (1 + rate);
        }

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('growthChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Projected 10-Year Growth (Incl. Match)',
                    data: points,
                    borderColor: '#4b5320',
                    backgroundColor: 'rgba(75, 83, 32, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: false } } }
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('tsp_maxer_data_v2');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('basePay').value = data.basePay;
            document.getElementById('roi').value = data.roi;
            document.getElementById('tisCheck').checked = data.tisEligible;
            const inputs = document.querySelectorAll('.month-input');
            data.monthlyValues.forEach((v, i) => { if(v > 0) inputs[i].value = v; });
        }
        calculate();
    }
</script>
</body>
</html>
